name: Cleanup old package versions

on:
  schedule:
    - cron: "0 3 * * 0" # Every Sunday at 03:00 UTC
  workflow_dispatch:

jobs:
  cleanup:
    name: Cleanup ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [fintrack-backend, fintrack-frontend]
    permissions:
      packages: write
    steps:
      - name: Delete untagged and old sha versions
        uses: actions/github-script@v7
        with:
          script: |
            const pkg = "${{ matrix.package }}";
            let deleted = 0;
            let page = 1;

            while (true) {
              const { data: versions } = await github.rest.packages.getAllPackageVersionsForPackageOwnedByAuthenticatedUser({
                package_type: "container",
                package_name: pkg,
                per_page: 100,
                page: page,
              });

              if (versions.length === 0) break;

              for (const v of versions) {
                const tags = v.metadata?.container?.tags || [];
                const keep = tags.some(t => /^(latest|\d+\.\d+(\.\d+)?)$/.test(t));
                if (keep) continue;

                try {
                  await github.rest.packages.deletePackageVersionForAuthenticatedUser({
                    package_type: "container",
                    package_name: pkg,
                    package_version_id: v.id,
                  });
                  deleted++;
                } catch (e) {
                  core.warning(`Failed to delete ${v.id}: ${e.message}`);
                }
              }

              if (versions.length < 100) break;
              page++;
            }

            core.info(`Deleted ${deleted} versions from ${pkg}`);
